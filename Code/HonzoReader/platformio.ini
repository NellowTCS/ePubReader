[platformio]
default_envs = OTA_APP

; Common settings
[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio

; OTA App (BookReader)
[env:OTA_APP]
extends = common
board_build.partitions = partitions_OTA_APP.csv
build_flags =
    -DOTA_APP_FLAG=1
    -DPOCKETMAGE_HW_VERSION=0
    -DMONITOR_SPEED=115200
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDISABLE_DIAGNOSTIC_OUTPUT
    -std=gnu++17
    -Wno-unused-parameter
    -Wno-unknown-pragmas
    -Iinclude
    -Ilib/lexepub_c/include
    -I.pio/libdeps/OTA_APP/ESP32_USB_Host_HID
build_unflags =
    -std=gnu++11
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit TCA8418 @ ^1.0.2
    adafruit/RTClib @ ^2.1.4
    olikraus/U8g2 @ ^2.36.4
    adafruit/Adafruit MPR121 @ ^1.1.2
    gmarty2000/Buzzer @ ^1.0.0
    https://github.com/ashtf8/GxEPD2_Editable_useFastFullUpdate.git
    https://github.com/esp32beans/ESP32_USB_Host_HID.git
    tobozo/ESP32-targz
    bblanchon/ArduinoJson @ ^7.3.1
lib_ignore =
    ESP32-targz
    ESP32_USB_Host_HID
extra_scripts =
    pre:extra_script.py
